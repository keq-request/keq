on:
  push:
    branches:
      - main
      - alpha
      - beta
  workflow_dispatch:

name: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  NPM_CONFIG_TAG: "${{ github.ref_name == 'main' && 'latest' || github.ref_name }}"
  NPM_CONFIG_PROVENANCE: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # node-version-file: ".node-version"
          node-version: "24" # npm must be >= 11.5.1 to support trusted publish
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: pnpm install

      - name: Enter prerelease mode
        if: env.NPM_CONFIG_TAG != 'latest' && hashFiles('.changeset/pre.json') == ''
        run: pnpm changeset pre enter ${{ env.NPM_CONFIG_TAG }}

      - name: Upgrade prerelease tag
        if: env.NPM_CONFIG_TAG != 'latest' && hashFiles('.changeset/pre.json') != ''
        run: |
          CURRENT_TAG=$(node -e "console.log(require('./.changeset/pre.json').tag)")
          EXPECTED_TAG="${{ env.NPM_CONFIG_TAG }}"

          if [ "$CURRENT_TAG" = "$EXPECTED_TAG" ]; then
            exit 0
          fi

          tag_order() {
            case "$1" in
              alpha) echo 1 ;;
              beta) echo 2 ;;
              rc) echo 3 ;;
              *) echo 0 ;;
            esac
          }

          CURRENT_ORDER=$(tag_order "$CURRENT_TAG")
          EXPECTED_ORDER=$(tag_order "$EXPECTED_TAG")

          if [ "$EXPECTED_ORDER" -le "$CURRENT_ORDER" ]; then
            echo "::error::Cannot downgrade prerelease tag from $CURRENT_TAG to $EXPECTED_TAG"
            exit 1
          fi

          echo "Upgrading prerelease tag: $CURRENT_TAG -> $EXPECTED_TAG"

          pnpm changeset pre exit
          pnpm changeset pre enter $EXPECTED_TAG

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset/pre.json
          git commit -m "chore: upgrade prerelease tag $CURRENT_TAG -> $EXPECTED_TAG"

      - name: Exit prerelease mode
        if: env.NPM_CONFIG_TAG == 'latest' && hashFiles('.changeset/pre.json') != ''
        run: |
          pnpm changeset pre exit
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset/pre.json
          git commit -m "chore: exit prerelease mode"

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          title: "Release"
          commit: "chore: release"
          commitMode: github-api
          version: pnpm changeset version
          publish: "pnpm run release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
