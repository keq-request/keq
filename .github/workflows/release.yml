on:
  push:
    branches:
      - main
      - alpha
      - beta
  workflow_dispatch:

name: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  NPM_CONFIG_TAG: "${{ github.ref_name == 'main' && 'latest' || github.ref_name }}"
  NPM_CONFIG_PROVENANCE: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # node-version-file: ".node-version"
          node-version: "24" # npm must be >= 11.5.1 to support trusted publish
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: pnpm install

      - name: Enter prerelease mode
        if: env.NPM_CONFIG_TAG != 'latest' && hashFiles('.changeset/pre.json') == ''
        run: pnpm changeset pre enter ${{ env.NPM_CONFIG_TAG }}

      - name: Upgrade prerelease tag
        id: pre-upgrade
        if: env.NPM_CONFIG_TAG != 'latest' && hashFiles('.changeset/pre.json') != ''
        uses: ./.github/actions/upgrade-prerelease
        with:
          expected-tag: ${{ env.NPM_CONFIG_TAG }}
          base-branch: ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Exit prerelease mode
        if: env.NPM_CONFIG_TAG == 'latest' && hashFiles('.changeset/pre.json') != ''
        run: pnpm changeset pre exit

      - name: Create Release Pull Request or Publish
        id: changesets
        if: steps.pre-upgrade.outputs.upgraded != 'true'
        uses: changesets/action@v1
        with:
          title: "Release"
          commit: "chore: release"
          publish: "pnpm run release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
